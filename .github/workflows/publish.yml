name: Publish Android SDK

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Android Autolinking
        run: npm run android-autolinking
        working-directory: .

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        working-directory: android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          OVERRIDE_SDK_VERSION: ${{ steps.get_version.outputs.VERSION }}
          LIBRE_BUILD: false

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jitsi-android-sdk-${{ steps.get_version.outputs.VERSION }}
          path: |
            android/sdk/build/outputs/aar/*.aar
            android/sdk/build/publications/release/*.xml
            android/sdk/build/libs/*.jar
