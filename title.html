        var location = window.location;

        var absoluteUrl = location.origin + contextPath + 'images/jitsilogo.png?v=1';
        var ogimagemeta = document.getElementById('ogimagemeta');
        var itempropimagemeta = document.getElementById('itempropimagemeta');
        if (ogimagemeta) {
            ogimagemeta.setAttribute('content', absoluteUrl);
        }
        if (itempropimagemeta) {
            itempropimagemeta.setAttribute('content', absoluteUrl);
        }
    })();
</script>
