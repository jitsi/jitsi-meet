apply plugin: 'com.android.library'
apply plugin: 'com.facebook.react'
apply plugin: 'maven-publish'

android {
    compileSdkVersion rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion

    defaultConfig {
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        buildConfigField "String", "SDK_VERSION", "\"$sdkVersion\""
    }

    buildTypes {
        debug {
            buildConfigField "boolean", "LIBRE_BUILD", "${rootProject.ext.libreBuild}"
            buildConfigField "boolean", "GOOGLE_SERVICES_ENABLED", "${rootProject.ext.googleServicesEnabled}"
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            buildConfigField "boolean", "LIBRE_BUILD", "${rootProject.ext.libreBuild}"
            buildConfigField "boolean", "GOOGLE_SERVICES_ENABLED", "${rootProject.ext.googleServicesEnabled}"
        }
    }

    sourceSets {
        main {
            java {
                exclude "test/"
            }
        }
    }
    namespace 'org.jitsi.meet.sdk'
}

apply from: 'build_library_variants.gradle'

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.appcompat:appcompat:1.4.1'
    implementation 'androidx.fragment:fragment:1.4.1'
    implementation 'androidx.localbroadcastmanager:localbroadcastmanager:1.0.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'

    api "com.facebook.react:react-android:$rootProject.ext.rnVersion"
    api "com.facebook.react:hermes-android:$rootProject.ext.rnVersion"

    implementation 'com.dropbox.core:dropbox-core-sdk:4.0.1'
    implementation 'com.jakewharton.timber:timber:5.0.1'
    implementation 'com.google.code.gson:gson:2.8.6'
    implementation 'androidx.startup:startup-runtime:1.1.0'
    implementation 'com.google.j2objc:j2objc-annotations:3.0.0'

    // Only add these packages if we are NOT doing a LIBRE_BUILD
    if (!rootProject.ext.libreBuild) {
        implementation safeProject(':amplitude-analytics-react-native', 'org.jitsi.react:amplitude-analytics-react-native:2.16.1')
        implementation safeProject(':giphy-react-native-sdk', 'org.jitsi.react:giphy-react-native-sdk:2.3.0')
        implementation(safeProject(':react-native-google-signin-google-signin', 'org.jitsi.react:react-native-google-signin-google-signin:11.0.1')) {
            exclude group: 'com.google.android.gms'
            exclude group: 'androidx'
        }
    }

    implementation safeProject(':react-native-async-storage-async-storage', 'org.jitsi.react:react-native-async-storage-async-storage:1.21.0')
    implementation safeProject(':react-native-background-timer', 'org.jitsi.react:react-native-background-timer:2.4.1')
    implementation safeProject(':react-native-calendar-events', 'org.jitsi.react:react-native-calendar-events:2.2.0')
    implementation safeProject(':react-native-clipboard-clipboard', 'org.jitsi.react:react-native-clipboard-clipboard:1.13.2')
    implementation safeProject(':react-native-community-netinfo', 'org.jitsi.react:react-native-community-netinfo:11.2.1')
    implementation safeProject(':react-native-default-preference', 'org.jitsi.react:react-native-default-preference:1.4.4')
    implementation(safeProject(':react-native-device-info', 'org.jitsi.react:react-native-device-info:10.12.0')) {
        exclude group: 'com.google.firebase'
        exclude group: 'com.google.android.gms'
        exclude group: 'com.android.installreferrer'
    }
    implementation safeProject(':react-native-gesture-handler', 'org.jitsi.react:react-native-gesture-handler:2.14.0')
    implementation safeProject(':react-native-get-random-values', 'org.jitsi.react:react-native-get-random-values:1.10.0')
    implementation safeProject(':sayem314-react-native-keep-awake', 'org.jitsi.react:sayem314-react-native-keep-awake:1.2.0')
    implementation safeProject(':react-native-orientation-locker', 'org.jitsi.react:react-native-orientation-locker:1.5.0')
    implementation safeProject(':react-native-pager-view', 'org.jitsi.react:react-native-pager-view:6.2.3')
    implementation safeProject(':react-native-performance', 'org.jitsi.react:react-native-performance:5.0.0')
    implementation safeProject(':react-native-safe-area-context', 'org.jitsi.react:react-native-safe-area-context:4.8.2')
    implementation safeProject(':react-native-screens', 'org.jitsi.react:react-native-screens:3.29.0')
    implementation safeProject(':react-native-community-slider', 'org.jitsi.react:react-native-community-slider:4.4.3')
    implementation safeProject(':react-native-sound', 'org.jitsi.react:react-native-sound:0.11.2')
    implementation safeProject(':react-native-splash-view', 'org.jitsi.react:react-native-splash-view:0.0.1')
    implementation safeProject(':react-native-svg', 'org.jitsi.react:react-native-svg:14.1.0')
    implementation safeProject(':react-native-video', 'org.jitsi.react:react-native-video:5.2.1')
    implementation safeProject(':react-native-webview', 'org.jitsi.react:react-native-webview:13.6.3')
    implementation safeProject(':react-native-worklets-core', 'org.jitsi.react:react-native-worklets-core:0.5.0')

    // Use `api` here so consumers can use WebRTCModuleOptions.
    api safeProject(':react-native-webrtc', 'org.jitsi.react:react-native-webrtc:118.0.1')

    testImplementation 'junit:junit:4.12'
}


publishing {
    publications {
        aarArchive(MavenPublication) {
            groupId 'com.github.ali-saranj.custom-jitsi-meet'
            artifactId 'jitsi-meet-sdk'
            version System.env.VERSION ?: (System.env.OVERRIDE_SDK_VERSION ?: project.sdkVersion)

            artifact("${project.buildDir}/outputs/aar/${project.name}-release.aar") {
                extension "aar"
            }
            pom.withXml {
                def pomXml = asNode()
                pomXml.appendNode('name', 'jitsi-meet-sdk')
                pomXml.appendNode('description', 'Jitsi Meet SDK for Android')
                def dependencies = pomXml.appendNode('dependencies')
                configurations.getByName('releaseCompileClasspath').getResolvedConfiguration().getFirstLevelModuleDependencies().each {
                    def groupId = it.moduleGroup
                    def artifactId = it.moduleName

                    if (artifactId.contains('react-native')) {
                        groupId = rootProject.ext.moduleGroupId
                    }

                    def dependency = dependencies.appendNode('dependency')
                    dependency.appendNode('groupId', groupId)
                    dependency.appendNode('artifactId', artifactId)
                    dependency.appendNode('version', it.moduleVersion)
                }
            }
        }

    }
    repositories {
        maven {
            url rootProject.ext.mavenRepo
            if (!rootProject.ext.mavenRepo.startsWith("file")) {
                credentials {
                    username rootProject.ext.mavenUser
                    password rootProject.ext.mavenPassword
                }
            }
        }
    }
}

tasks.matching { it.name.startsWith("publish") }.configureEach { publishTask ->
    publishTask.dependsOn tasks.matching { it.name == "bundleReleaseAar" }
}
